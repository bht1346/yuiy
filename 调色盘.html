<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标准色盘取色器（双向同步）</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui;
    }
    body {
        background: #f5f5f7;
        padding: 25px;
        max-width: 500px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 26px;
    }
    #colorPicker {
        width: 100%;
        height: 110px;
        border: none;
        border-radius: 18px;
        cursor: pointer;
    }
    #preview {
        height: 100px;
        border-radius: 16px;
        border: 3px solid #fff;
        box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    #hexCode {
        background: white;
        padding: 18px;
        border-radius: 14px;
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        color: #333;
        border: none;
        outline: none;
    }
    #jumpBtn {
        background: #007aff;
        color: white;
        border: none;
        padding: 20px;
        border-radius: 16px;
        font-size: 18px;
        font-weight: bold;
    }
    .tip {
        text-align: center;
        font-size: 14px;
        color: #777;
        margin-top: 4px;
    }
</style>
</head>
<body>

<input type="color" id="colorPicker" value="#F8D7DA">
<div class="tip">点击上方色盘，或点“更多”精细调色值</div>
<div id="preview"></div>
<!-- 现在这里可以输入色值，自动同步色盘 -->
<input type="text" id="hexCode" placeholder="#FFFFFF" value="#F8D7DA">
<button id="jumpBtn">前往目标页面</button>

<script>
    const picker = document.getElementById('colorPicker');
    const preview = document.getElementById('preview');
    const hex = document.getElementById('hexCode');
    const btn = document.getElementById('jumpBtn');

    // 初始化
    preview.style.backgroundColor = picker.value;

    // 色盘 → 输入框
    picker.addEventListener('input', () => {
        hex.value = picker.value;
        preview.style.backgroundColor = picker.value;
    });

    // 输入框 → 色盘（双向同步）
    hex.addEventListener('input', () => {
        let val = hex.value.trim();
        if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
            picker.value = val;
            preview.style.backgroundColor = val;
        }
    });

    // 跳转
    btn.addEventListener('click', () => {
        window.location.href = "https://www.baidu.com";
    });
</script>

</body>
</html>
