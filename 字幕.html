<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日一句</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #a8e6cf, #ffd3e0, #c4f0f7, #ffc2e2);
            background-size: 400% 400%;
            animation: bgGradient 12s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .text-box {
            max-width: 800px;
            padding: 40px;
            text-align: center;
            color: #2c3e50;
            opacity: 0;
            transform: scale(0.6);
            animation: expandOut 1.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes expandOut {
            to { opacity:1; transform:scale(1); }
        }
        #dailyText {
            font-size: 32px;
            line-height: 1.8;
            font-weight: 400;
            letter-spacing: 2px;
        }
        .tip {
            margin-top: 25px;
            font-size:14px;
            color:#666;
            opacity:0.7;
        }
    </style>
</head>
<body>
    <div class="text-box">
        <div id="dailyText">正在加载...</div>
        <div class="tip">每日一句 · 自动更新</div>
    </div>

    <script>
        // 已填入你的真实链接（预览/线上都能用）
        const txtUrl = "zimu.txt";

        async function loadText() {
            try {
                let res = await fetch(txtUrl);
                let text = await res.text();
                
                let lines = text
                    .split(/\r?\n/)
                    .map(line => line.trim())
                    .filter(line => line.length > 0);

                if (lines.length === 0) {
                    document.getElementById("dailyText").innerText = "文件为空";
                    return;
                }

                const start = new Date("2025-01-01");
                const now = new Date();
                const days = Math.floor((now - start) / 86400000);
                const index = days % lines.length;

                document.getElementById("dailyText").innerText = lines[index];
            } catch (err) {
                document.getElementById("dailyText").innerText = "加载失败";
            }
        }
        loadText();
    </script>
</body>
</html>
